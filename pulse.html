<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>In C — Pulse &amp; Score</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div class="wrap pulse-page">
    <div class="controls pulse-controls">
      <a class="backlink" href="index.html" style="margin:0" title="Back to In C">←</a>
      <button id="play" class="go big">▶ Start pulse</button>
      <div class="field">
        <label for="bpm">Pulse (BPM)</label>
        <input id="bpm" type="number" min="20" max="400" step="1" value="120" inputmode="numeric">
      </div>
      <div class="metro">
        <div class="beat-orb" id="orb"></div>
        <div class="metro-text">
          <div id="rate" class="pulse-rate"></div>
          <div class="metro-label">phones: tap once per flash to rejoin</div>
        </div>
      </div>
      <div class="spacer"></div>
      <button id="fit" class="ghost" title="Resize the whole score to fit this screen">⤢ Fit to screen</button>
      <div class="field">
        <label for="size">Size</label>
        <input id="size" type="range" min="0.22" max="2.2" step="0.01" value="0.95" style="width:150px;min-height:auto">
      </div>
    </div>

    <div class="score-area">
      <div id="grid" class="score-grid"></div>
    </div>
  </div>

  <script src="vendor/Tone.js"></script>
  <script src="vendor/vexflow.js"></script>
  <script src="js/score-data.js?v=3"></script>
  <script src="js/notation.js?v=3"></script>
  <script src="js/audio.js?v=3"></script>
  <script src="js/pulse.js?v=3"></script>
</body>
</html>
